# Optional local Postgres — matches ARCHITECTURE.md persistence model.
# Usage: docker compose up -d
# Then set DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/investor_ops

services:
  postgres:
    image: postgres:16-alpine
    container_name: investor-ops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investor_ops
    ports:
      - "5432:5432"
    volumes:
      - investor_ops_pgdata:/var/lib/postgresql/data

volumes:
  investor_ops_pgdata:
