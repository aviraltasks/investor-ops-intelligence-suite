# Render Blueprint — https://render.com/docs/blueprint-spec
# Set CORS_ORIGINS to your Vercel URL (comma-separated if multiple).

services:
  - type: web
    name: investor-ops-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
